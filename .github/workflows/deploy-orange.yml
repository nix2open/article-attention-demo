name: Deploy orange demo

on:
  push:
    branches: [main]
    paths:
      - "orange/index.html"
      - "orange/**"
      - "deploy/remote-deploy-orange.sh"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive current and upload new page
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            TARGET=/opt/premium-measure/public/embed/article-attention-demo-orange
            ARCHIVE_DIR="$TARGET/archived"
            mkdir -p "$ARCHIVE_DIR"
            if [ -f "$TARGET/index.html" ]; then
              TS=$(date -u +%Y-%m-%dT%H%M%SZ)
              cp "$TARGET/index.html" "$ARCHIVE_DIR/index-archived-${TS}.html"
              echo "Archived index-archived-${TS}.html"
            fi

      - name: Copy index.html to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "orange/index.html"
          target: "/opt/premium-measure/public/embed/article-attention-demo-orange"
          strip_components: 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            ls -la /opt/premium-measure/public/embed/article-attention-demo-orange/index.html
            echo "Live: https://measure.geniusgroup.cc/embed/article-attention-demo-orange/"
